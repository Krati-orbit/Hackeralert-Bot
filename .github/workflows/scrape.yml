name: HackAlert Scraper Bot

on:
  schedule:
    # Run every 6 hours (at 00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

permissions:
  contents: write  # Crucial to allow committing notified_opportunities.json back to the repo

jobs:
  scrape-and-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history to avoid issues with committing back
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies to speed up runs

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run HackAlert Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          STUDENT_PROFILE: ${{ secrets.STUDENT_PROFILE }}
        run: |
          python main.py

      - name: Commit and Push database changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if notified_opportunities.json has modified changes
          if git diff --quiet notified_opportunities.json; then
            echo "No new opportunities added to database. Skipping commit."
          else
            echo "Database updated. Committing and pushing changes..."
            git add notified_opportunities.json
            git commit -m "chore: update notified opportunities database [skip ci]"
            git push
          fi
